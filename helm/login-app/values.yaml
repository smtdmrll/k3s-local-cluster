replicaCount: 1

image:
  repository: sametdemirel/login-app
  pullPolicy: IfNotPresent
  tag: "1.0.1"

service:
  type: NodePort
  port: 5000
  nodePort: 30080

postgresql:
  host: postgresql.postgres.svc.cluster.local
  port: 5432
  database: appdb
  username: appuser
  password: ""

redis:
  host: redis-master.redis.svc.cluster.local
  port: 6379
  password: ""

app:
  secretKey: ""

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
