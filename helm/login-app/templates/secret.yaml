apiVersion: v1
kind: Secret
metadata:
  name: {{ include "login-app.fullname" . }}-secret
  labels:
    {{- include "login-app.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ .Values.postgresql.password | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.redis.password | b64enc | quote }}
  SECRET_KEY: {{ .Values.app.secretKey | b64enc | quote }}
